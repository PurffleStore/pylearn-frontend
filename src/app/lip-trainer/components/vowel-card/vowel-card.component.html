<div class="vowel-card" [class.compact]="compact">

  <!-- Animated background orb -->
  <div class="card-orb"></div>

  <!-- Sound badge -->
  <div class="sound-badge" [class.long]="card.soundType === 'long'" [class.short]="card.soundType === 'short'">
    <span class="badge-pulse"></span>
    {{ card.soundType === 'long' ? '🔊 Long Sound' : '⚡ Short Sound' }}
  </div>

  <!-- Hero letter -->
  <div class="letter-stage">
    <div class="letter-glow"></div>
    <span class="big-letter">{{ card.letter }}</span>
  </div>

  <!-- Label chip -->
  <div class="label-chip">{{ card.label }}</div>

  <!-- Example word -->
  <div class="example-word-row">
    <span class="example-word">{{ card.exampleWord }}</span>
    <span class="example-meaning">= {{ card.exampleMeaning }}</span>
  </div>

  <!-- Type pill -->
  <div class="type-pill">🔤 Swedish Vowel</div>

</div>
